name: Auto-assign Awaiting Review milestone

on:
  workflow_call:

jobs:
  assign-milestone:
    name: Assign milestone
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            if (issue.milestone) {
              console.log(`Issue #${issue.number} already has milestone "${issue.milestone.title}", skipping.`);
              return;
            }
            const milestones = await github.rest.issues.listMilestones({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open'
            });
            const awaiting = milestones.data.find(m => m.title === 'Awaiting Review');
            if (awaiting) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                milestone: awaiting.number
              });
              console.log(`Assigned "Awaiting Review" milestone to issue #${issue.number}`);
            } else {
              console.log('No "Awaiting Review" milestone found in this repo.');
            }
